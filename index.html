<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanitas - Global Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="script.js" defer></script>

    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Horní HUD */
        #header-hud { padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); }
        #stage-header { font-size: 1.2rem; color: #f1c40f; font-weight: bold; }
        
        .hp-container { width: 280px; height: 25px; background: #222; border-radius: 12px; position: relative; overflow: hidden; border: 2px solid #444; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff5f6d, #ffc371); transition: width 0.2s; }
        
        /* Herní plocha */
        #game-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #monster { font-size: 150px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        #monster:active { transform: scale(0.9); }

        /* Modaly */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid #444; z-index: 2000; width: 320px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Tlačítka a UI */
        #bottom-panel { background: #161616; padding: 15px; border-top: 2px solid #282828; }
        .stats { margin-bottom: 10px; font-size: 1rem; color: #aaa; }
        #gold { color: #f1c40f; font-weight: bold; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        
        #btn-upgrade { width: 100%; padding: 15px; background: #27ae60; color: white; font-size: 1rem; }
        #btn-leaderboard { position: absolute; top: 15px; left: 15px; padding: 10px; background: #34495e; color: white; border-radius: 50%; width: 45px; height: 45px; }

        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>

    <button id="btn-leaderboard" onclick="openM('leaderboard-modal')">🏆</button>

    <div id="header-hud">
        <div id="stage-header">Stage: 1</div>
        <div class="hp-container">
            <div id="hp-bar"></div>
        </div>
        <div style="font-size: 0.9rem;">
            Hráč: <span id="user-display" style="color:#8e44ad; font-weight:bold;">Hledám...</span>
        </div>
    </div>

    <div id="game-area">
        <div id="monster" onclick="doTap(event)">👻</div>
    </div>

    <div id="bottom-panel">
        <div class="stats">
            Máš: <span id="gold">0</span> 💰 | Síla kliku: <span id="tap-val">1</span>
        </div>
        <button id="btn-upgrade" onclick="buyTap()">
            VYLEPŠIT MEČ (<span id="tap-cost">10</span> 💰)
        </button>
    </div>

    <div id="login-modal" class="modal" style="display: block;">
        <h3>Vítej v Titanitas!</h3>
        <p>Zadej své jméno pro ukládání do cloudu:</p>
        <input type="text" id="username-input" placeholder="Tvé jméno..." style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background: #111; color: white;">
        <button onclick="login()" style="width: 100%; padding: 12px; background: #27ae60; color: white;">ZAHÁJIT HRU</button>
    </div>

    <div id="leaderboard-modal" class="modal">
        <div class="modal-header">
            <h3>Globální Síň slávy</h3>
            <button onclick="closeM()" style="background:none; color:white; font-size: 20px;">&times;</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Stage</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>

</body>
</html>
