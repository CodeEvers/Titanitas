<!DOCTYPE html>
<html>
<head>
    <title>Titanitas - Global Hall of Fame Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 1.5s ease; }
        
        /* Horní lišta a Leaderboard ikona */
        #leaderboard-trigger { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: 2px solid #f1c40f; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 100; transition: transform 0.2s; box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        #leaderboard-trigger:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }

        /* HUD & Monster Section */
        #header-hud { padding-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 10; }
        #stage-header { font-size: 1.1rem; color: #888; font-weight: bold; letter-spacing: 1px; }
        .hp-container { width: 260px; height: 22px; background: #222; border-radius: 8px; position: relative; overflow: hidden; border: 2px solid #333; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(180deg, #ff5f6d, #ffc371); transition: width 0.1s; }
        #hp-text { position: absolute; width: 100%; top: 50%; left: 0; transform: translateY(-50%); font-weight: bold; font-size: 12px; text-shadow: 1px 1px 2px black; }
        
        #game-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #monster { font-size: 160px; cursor: pointer; user-select: none; transition: transform 0.05s; z-index: 10; position: relative; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .golden-monster { filter: drop-shadow(0 0 35px #f1c40f) brightness(1.3) !important; }

        /* Particles & Damage Numbers */
        .particle { position: absolute; width: 6px; height: 6px; background: #f1c40f; border-radius: 50%; pointer-events: none; z-index: 100; }
        .dmg-text { position: absolute; font-weight: 900; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 101; color: #f1c40f; font-size: 26px; text-shadow: 2px 2px 4px black; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-130px) scale(1.2); opacity: 0; } }
        
        .crit-shake { animation: shake 0.25s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 5px #ff0000; } 50% { transform: scale(1.05); box-shadow: 0 0 20px #ff0000; } 100% { transform: scale(1); box-shadow: 0 0 5px #ff0000; } }

        #action-bar { display: grid; grid-template-columns: repeat(5, 1fr); padding: 0 10px; margin-bottom: 12px; gap: 6px; }
        .action-btn { padding: 12px 2px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 0.7rem; border-bottom: 4px solid rgba(0,0,0,0.3); transition: transform 0.1s; }
        .action-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-achieve { background: #34495e; } .btn-hero { background: #2980b9; } .btn-char { background: #8e44ad; } .btn-shop { background: #27ae60; }
        .btn-prestige { background: #c0392b; opacity: 0.3; cursor: not-allowed; }
        .btn-prestige.ready { opacity: 1; cursor: pointer; animation: pulse 1.5s infinite; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 20px; border-radius: 15px; border: 2px solid #444; z-index: 2000; width: 340px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 60px rgba(0,0,0,1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; margin-bottom: 15px; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #222; padding: 10px; text-align: left; font-size: 0.8rem; border-bottom: 2px solid #444; }
        td { padding: 10px; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .top1 { color: #f1c40f; font-weight: bold; background: rgba(241, 196, 15, 0.05); }
        .top2 { color: #bdc3c7; } .top3 { color: #cd7f32; }
        .my-row { background: rgba(142, 68, 173, 0.2) !important; border: 1px solid #8e44ad; }

        .login-form { display: flex; flex-direction: column; gap: 12px; }
        .login-form input { padding: 14px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; font-size: 1rem; }

        .char-grid { display: grid; grid-template-columns: 85px 1fr 85px; gap: 12px; align-items: center; margin-bottom: 20px; }
        .slot-col { display: flex; flex-direction: column; gap: 10px; }
        .item-slot { width: 70px; height: 70px; background: #2c3e50; border: 2px dashed #555; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.65rem; cursor: pointer; transition: 0.2s; }
        .item-slot:hover { border-color: #888; background: #34495e; }
        .item-slot b { font-size: 1.1rem; }

        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #111; padding: 12px; border-radius: 10px; margin-top: 15px; }
        .inv-cell { width: 68px; height: 68px; background: #222; border: 1px solid #333; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .shop-item { background: #2c3e50; padding: 14px; border-radius: 10px; margin-bottom: 12px; border: 2px solid transparent; text-align: left; transition: 0.2s; }
        .better { border-color: #2ecc71; } .worse { border-color: #e74c3c; }
        .shop-btn { background: #f1c40f; color: black; border: none; padding: 7px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; float: right; margin-top: -5px; }

        .r-basic { color: #bdc3c7; } .r-rare { color: #3498db; } .r-epic { color: #9b59b6; } .r-legend { color: #f1c40f; } .r-mythic { color: #e74c3c; font-weight: bold; }

        #bottom-panel { background: #161616; border-top: 2px solid #282828; padding: 12px; z-index: 10; }
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 10px; font-size: 0.85rem; }
        #quick-tap { width: 100%; padding: 15px; background: #27ae60; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; border-bottom: 5px solid #1e8449; font-size: 1rem; }
        #quick-tap:disabled { background: #444; border-bottom: none; opacity: 0.5; transform: translateY(3px); }
    </style>
</head>
<body onclick="checkAuth()">

    <div id="leaderboard-trigger" onclick="openM('leaderboard-modal')">🏆</div>

    <div id="header-hud">
        <div id="stage-header">Stage: 1</div>
        <div class="hp-container"><div id="hp-bar"></div><div id="hp-text">10 / 10</div></div>
        <div style="font-size: 0.85rem; margin-top: 5px;">💎 Drahokamy: <b id="diamonds-hud">0</b> | <span id="user-display">Hráč</span></div>
    </div>

    <div id="game-area"><div id="monster" onclick="doTap(event)">👹</div></div>

    <div id="action-bar">
        <button class="action-btn btn-achieve" onclick="openM('achieve-modal')">🏆 ÚSPĚCHY</button>
        <button class="action-btn btn-hero" onclick="openM('heroes-modal')">🛡️ ARMÁDA</button>
        <button class="action-btn btn-char" onclick="openM('char-modal')">👤 POSTAVA</button>
        <button class="action-btn btn-shop" onclick="openM('shop-modal')">🛒 OBCHOD</button>
        <button id="prestigeBtn" class="action-btn btn-prestige" onclick="doResets()">✨ RESTART</button>
    </div>

    <div id="login-modal" class="modal" style="display:block;">
        <div class="modal-header"><h3>Vítej v Titanitas!</h3></div>
        <div class="login-form">
            <input type="text" id="username-input" placeholder="Jméno (min. 3 znaky)">
            <button onclick="login()" style="padding:15px; background:#27ae60; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:10px;">ZAHÁJIT DOBRODRUŽSTVÍ</button>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal">
        <div class="modal-header"><h3>Globální Síň slávy</h3><span style="cursor:pointer; font-size: 24px;" onclick="closeM()">&times;</span></div>
        <div id="leaderboard-loading">Načítám z cloudu...</div>
        <table>
            <thead><tr><th>#</th><th>Hráč</th><th>Zlato</th><th>Stage</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div id="char-modal" class="modal">
        <div class="modal-header"><h3>Vybavení postavy</h3><span style="cursor:pointer; font-size: 24px;" onclick="closeM()">&times;</span></div>
        <div class="char-grid">
            <div class="slot-col">
                <div class="item-slot" id="slot-helma" onclick="unequip('helma')"><span>Helma</span></div>
                <div class="item-slot" id="slot-hrud" onclick="unequip('hrud')"><span>Hruď</span></div>
                <div class="item-slot" id="slot-kalhoty" onclick="unequip('kalhoty')"><span>Kalhoty</span></div>
                <div class="item-slot" id="slot-boty" onclick="unequip('boty')"><span>Boty</span></div>
            </div>
            <div class="char-visual" id="char-icon">👤</div>
            <div class="slot-col">
                <div class="item-slot" id="slot-nausnice" onclick="unequip('nausnice')"><span>Náušnice</span></div>
                <div class="item-slot" id="slot-prsten" onclick="unequip('prsten')"><span>Prsten</span></div>
                <div class="item-slot" id="slot-stit" onclick="unequip('stit')"><span>Štít</span></div>
                <div class="item-slot" id="slot-mec" onclick="unequip('mec')"><span>Meč</span></div>
            </div>
        </div>
        <div class="inventory-grid" id="inv-grid"></div>
    </div>

    <div id="shop-modal" class="modal">
        <div class="modal-header"><h3>Obchodník</h3><span style="cursor:pointer; font-size: 24px;" onclick="closeM()">&times;</span></div>
        <button onclick="refreshShop()" style="width:100%; margin-bottom:15px; background:#2980b9; color:white; padding:12px; border-radius:10px; cursor:pointer;">Obnovit zboží (5 💎)</button>
        <div id="shop-items"></div>
    </div>

    <div id="heroes-modal" class="modal">
        <div class="modal-header"><h3>Najmout hrdiny</h3><span style="cursor:pointer; font-size: 24px;" onclick="closeM()">&times;</span></div>
        <div id="heroes-list"></div>
    </div>

    <div id="achieve-modal" class="modal">
        <div class="modal-header"><h3>Tvé úspěchy</h3><span style="cursor:pointer; font-size: 24px;" onclick="closeM()">&times;</span></div>
        <div id="achieve-list"></div>
    </div>

    <div id="bottom-panel">
        <div class="stats-row">
            <span>Zlato: <b id="gold">0</b></span>
            <span>DPS: <b id="dps">0</b></span>
            <span>Klik: <b id="tap-val">1</b></span>
        </div>
        <button id="quick-tap" onclick="buyTap()">⚔️ VYLEPŠIT MEČ (<span id="tap-cost">10</span> 💰)</button>
    </div>

    <script>
        // --- KONFIGURACE SUPABASE (Opraveno přejmenováním, aby nekolidovalo s knihovnou) ---
        const supabaseUrl = 'https://ypiouidfskzfwuvldwlk.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwaW91aWRmc2t6Znd1dmxkd2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg4NzUsImV4cCI6MjA4ODIwNDg3NX0.hwpuuxMdII0uB1HQgu8RN-NFgOBy9UOdU7J9QZsPizA';
        
        // Důležitá změna: proměnná se jmenuje supabaseClient
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- HERNÍ KONFIGURACE ---
        const heroesCfg = [
            { n: "🛡️ Strážce Vít", bC: 50, bD: 1 },
            { n: "🏹 Lučištnice Ema", bC: 250, bD: 8 },
            { n: "🧙 Mág Merlin", bC: 1200, bD: 45 },
            { n: "⚔️ Rytíř Roland", bC: 6500, bD: 220 },
            { n: "🐲 Drak Bezzubka", bC: 45000, bD: 1100 }
        ];
        const rarities = [
            { n: "Basic", c: "r-basic", m: 1, p: 65 },
            { n: "Rare", c: "r-rare", m: 3, p: 22 },
            { n: "Epic", c: "r-epic", m: 8, p: 8 },
            { n: "Legend", c: "r-legend", m: 25, p: 4 },
            { n: "Mythic", c: "r-mythic", m: 80, p: 1 }
        ];
        const itemTypes = ['helma', 'hrud', 'kalhoty', 'boty', 'nausnice', 'prsten', 'stit', 'mec'];

        // --- STAV HRY ---
        let currentUser = localStorage.getItem('tt_user_v6') || null;
        let raw = JSON.parse(localStorage.getItem('ttSave_v6')) || {};
        
        let gold = raw.gold || 0, stage = raw.stage || 1, tapDmg = raw.tapDmg || 1, tapCost = raw.tapCost || 10;
        let hLv = raw.hLv || [0,0,0,0,0], diamonds = raw.diamonds || 0, resets = raw.resets || 0;
        let inv = raw.inv || [], eq = raw.eq || {}, shopItems = raw.shopItems || [];
        let clicks = raw.clicks || 0, kills = raw.kills || 0, maxStage = raw.maxStage || 1;

        let mHP = 10, mCurr = 10, totalDPS = 0, totalTap = 1, goldMult = 1, isGolden = false;

        async function save() { 
            if(stage > maxStage) maxStage = stage;
            localStorage.setItem('ttSave_v6', JSON.stringify({ gold, stage, tapDmg, tapCost, hLv, diamonds, resets, inv, eq, shopItems, clicks, kills, maxStage })); 
            
            // OPRAVENO: Cloud save nyní používá správné názvy sloupců (gold, stage)
            if(currentUser) {
                try {
                    await supabaseClient.from('leaderboard').upsert({ 
                        name: currentUser, 
                        gold: Math.floor(gold), 
                        stage: stage 
                    }, { onConflict: 'name' });
                } catch (e) { console.error("DB Save Error", e); }
            }
        }

        // --- SYSTÉM PŘIHLÁŠENÍ ---
        function login() {
            let u = document.getElementById('username-input').value.trim();
            if(u.length < 3) return alert("Jméno musí mít alespoň 3 znaky!");
            currentUser = u;
            localStorage.setItem('tt_user_v6', u);
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('user-display').innerText = "👤 " + u;
            updateUI();
            save();
        }
        function checkAuth() { if(!currentUser) document.getElementById('login-modal').style.display = 'block'; }

        // --- GLOBÁLNÍ ŽEBŘÍČEK ---
        async function renderLeaderboard() {
            document.getElementById('leaderboard-loading').style.display = "block";
            let { data, error } = await supabaseClient
                .from('leaderboard')
                .select('*')
                .order('stage', { ascending: false })
                .limit(20);
            
            if(error) return console.error(error);
            document.getElementById('leaderboard-loading').style.display = "none";

            let html = "";
            data.forEach((p, i) => {
                let rank = i + 1;
                let rClass = rank === 1 ? 'top1' : (rank === 2 ? 'top2' : (rank === 3 ? 'top3' : ''));
                if(p.name === currentUser) rClass += " my-row";
                html += `<tr class="${rClass}"><td>${rank}.</td><td>${p.name}</td><td>${p.gold}</td><td>${p.stage}</td></tr>`;
            });
            document.getElementById('leaderboard-body').innerHTML = html;
        }

        // --- MODÁLY ---
        function openM(id) { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'char-modal') renderChar();
            if(id === 'shop-modal') renderShop();
            if(id === 'heroes-modal') renderHeroes();
            if(id === 'achieve-modal') renderAchievements();
            if(id === 'leaderboard-modal') renderLeaderboard();
        }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        // --- PŘEDMĚTY ---
        function generateItem() {
            let type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
            let rRoll = Math.random() * 100, r, sum = 0;
            for(let rarity of rarities) { sum += rarity.p; if(rRoll <= sum) { r = rarity; break; } }
            let power = Math.round((1 + resets * 5) * r.m * (0.8 + Math.random() * 0.4));
            let effect = ['mec', 'prsten', 'nausnice'].includes(type) ? "Tap DMG" : (type === 'stit' ? "Gold %" : "Hero DPS");
            return { type, rarity: r, power, effect, id: Date.now() + Math.random() };
        }

        function renderChar() {
            itemTypes.forEach(t => {
                let s = document.getElementById('slot-'+t);
                if(eq[t]) s.innerHTML = `<b class="${eq[t].rarity.c}">${eq[t].power}</b><br><small>${eq[t].effect}</small>`, s.style.border = "2px solid gold";
                else s.innerHTML = `<span>${t}</span>`, s.style.border = "2px dashed #444";
            });
            let invH = "";
            for(let i=0; i<8; i++) {
                let it = inv[i];
                invH += `<div class="inv-cell" onclick="handleInvClick(${i})">${it ? `<b class="${it.rarity.c}">${it.power}</b>` : ''}</div>`;
            }
            document.getElementById('inv-grid').innerHTML = invH;
        }

        function handleInvClick(idx) {
            let it = inv[idx]; if(!it) return;
            if(confirm(`Vybavit ${it.rarity.n} ${it.type} (+${it.power} ${it.effect})?`)) {
                let old = eq[it.type]; eq[it.type] = it; if(old) inv[idx] = old; else inv.splice(idx, 1);
            } else { gold += Math.floor(stage * 20 * it.rarity.m); inv.splice(idx, 1); }
            renderChar(); updateUI(); save();
        }

        function unequip(t) { if(!eq[t] || inv.length >= 8) return; inv.push(eq[t]); delete eq[t]; renderChar(); updateUI(); save(); }

        function renderShop() {
            if(shopItems.length === 0) refreshShop(true);
            let h = "";
            shopItems.forEach((it, idx) => {
                let cost = Math.round(it.power/2) + 5;
                h += `<div class="shop-item">
                    <b class="${it.rarity.c}">${it.rarity.n} ${it.type}</b><br>
                    <small>Dává: +${it.power} ${it.effect}</small>
                    <button class="shop-btn" onclick="buyItem(${idx})" ${diamonds < cost ? 'disabled' : ''}>${cost} 💎</button>
                </div>`;
            });
            document.getElementById('shop-items').innerHTML = h;
        }

        function refreshShop(f = false) { if(!f && diamonds < 5) return; if(!f) diamonds -= 5; shopItems = [generateItem(), generateItem(), generateItem()]; renderShop(); updateUI(); save(); }
        function buyItem(idx) {
            let it = shopItems[idx]; let cost = Math.round(it.power/2) + 5;
            if(diamonds >= cost && inv.length < 8) { diamonds -= cost; inv.push(it); shopItems.splice(idx, 1); renderShop(); updateUI(); save(); }
        }

        // --- BOJ ---
        function doTap(e) {
            if(!currentUser) return;
            clicks++; let crit = Math.random() < 0.1; let dmg = totalTap * (crit ? 5 : 1);
            mCurr -= dmg; if(mCurr <= 0) kill();
            const d = document.createElement('div'); d.className = 'dmg-text'; d.innerText = (crit ? '💥' : '') + Math.floor(dmg); d.style.left = e.clientX + 'px'; d.style.top = (e.clientY - 50) + 'px'; document.body.appendChild(d); setTimeout(() => d.remove(), 700);
            updateUI();
        }

        function kill() {
            kills++; let r = (stage % 10 === 0 ? stage * 25 : stage * 6) * goldMult; if(isGolden) r *= 10;
            gold += Math.floor(r); stage++; isGolden = Math.random() < 0.01;
            document.getElementById('monster').innerText = isGolden ? '💰' : ['👹','💀','👽','🤖','🐲','👻','👾','🎃','🧛','🧟'][Math.floor(Math.random()*10)];
            setHP(); updateBiome(); updateUI(); save();
        }

        function setHP() { mHP = Math.round(10 * Math.pow(1.3, stage)) * (stage % 10 === 0 ? 5 : 1); mCurr = mHP; }
        function updateBiome() { document.body.style.background = ['#0a0a0a', '#1e3a1e', '#3e2a1a', '#2c3e50', '#4a1a1a'][Math.min(Math.floor((stage-1)/10), 4)]; }
        function buyTap() { if(gold >= tapCost) { gold -= tapCost; tapDmg++; tapCost = Math.round(tapCost * 1.6); updateUI(); save(); } }
        function buyHero(i) { let cost = Math.round(heroesCfg[i].bC * Math.pow(1.25, hLv[i])); if(gold >= cost) { gold -= cost; hLv[i]++; updateUI(); renderHeroes(); save(); } }

        function doResets() {
            if(stage < 50) return;
            let gain = Math.floor(stage / 10);
            if(confirm(`VZESTUP: Získáš ${gain} 💎 a začneš znovu silnější!`)) {
                diamonds += gain; resets++; gold = 0; stage = 1; tapDmg = 1; tapCost = 10; hLv = [0,0,0,0,0];
                setHP(); updateBiome(); updateUI(); closeM(); save();
            }
        }

        function updateUI() {
            let gTap = 0, gDPS = 0, gGold = 1;
            Object.values(eq).forEach(i => { if (i.effect === "Tap DMG") gTap += i.power; if (i.effect === "Hero DPS") gDPS += i.power; if (i.effect === "Gold %") gGold += (i.power / 100); });
            let bDPS = 0; hLv.forEach((l, i) => bDPS += l * heroesCfg[i].bD);
            totalTap = tapDmg + gTap; totalDPS = bDPS + gDPS; goldMult = gGold;
            
            document.getElementById('gold').innerText = Math.floor(gold);
            document.getElementById('dps').innerText = Math.floor(totalDPS);
            document.getElementById('tap-val').innerText = totalTap;
            document.getElementById('tap-cost').innerText = tapCost;
            document.getElementById('diamonds-hud').innerText = diamonds;
            document.getElementById('hp-bar').style.width = (mCurr / mHP * 100) + "%";
            document.getElementById('hp-text').innerText = Math.ceil(mCurr) + " / " + mHP;
            document.getElementById('stage-header').innerHTML = stage % 10 === 0 ? `<span style="color:#ff4d4d">⚠️ BOSS: ${stage} ⚠️</span>` : `Stage: ${stage}`;
            
            let pBtn = document.getElementById('prestigeBtn');
            if(stage >= 50) pBtn.classList.add('ready'); else pBtn.classList.remove('ready');
            document.getElementById('quick-tap').disabled = gold < tapCost;
        }

        function renderHeroes() {
            document.getElementById('heroes-list').innerHTML = heroesCfg.map((h, i) => {
                let cost = Math.round(h.bC * Math.pow(1.25, hLv[i]));
                return `<div style="background:#2c3e50; margin:10px; padding:12px; border-radius:10px; text-align:left;">
                    <b>${h.n}</b> (Lv ${hLv[i]})<br>
                    <button onclick="buyHero(${i})" ${gold < cost ? 'disabled' : ''} style="float:right; padding:8px; background:#f1c40f; border:none; border-radius:5px; font-weight:bold;">${cost} 💰</button>
                </div>`;
            }).join('');
        }

        function renderAchievements() {
            document.getElementById('achieve-list').innerHTML = `<div style="text-align:left; padding:15px; background: #111; border-radius: 10px;">
                <p>🎯 Kliknutí: ${clicks}</p><p>⚔️ Killy: ${kills}</p><p>✨ Resety: ${resets}</p>
            </div>`;
        }

        setInterval(() => { if(totalDPS > 0 && currentUser) { mCurr -= totalDPS / 10; if(mCurr <= 0) kill(); updateUI(); } }, 100);
        
        window.onload = () => { 
            if(currentUser) { 
                document.getElementById('login-modal').style.display = 'none'; 
                document.getElementById('user-display').innerText = "👤 " + currentUser; 
            }
            setHP(); updateBiome(); updateUI(); 
        };
    </script>
</body>
</html>
