<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanitas - Global Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="game-container">
        <div id="status-bar">
            <span>Zlato: <span id="gold-display">0</span></span>
            <span>Stage: <span id="stage-display">1</span></span>
        </div>

        <div id="enemy-container">
            <div id="enemy-hp-bar"><div id="enemy-hp-fill"></div></div>
            <div id="enemy-click-area">👻</div>
        </div>

        <div id="leaderboard-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close-button" onclick="closeM()">&times;</span>
                <h2>Globální Síň slávy</h2>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Hráč</th>
                            <th>Resety</th>
                            <th>Stage</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="menu-bar">
            <button onclick="openM()">🏆 ŽEBŘÍČEK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
